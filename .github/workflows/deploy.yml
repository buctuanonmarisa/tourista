name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy project to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ".dockerignore,Dockerfile,entrypoint.sh,next.config.js,package.json,package-lock.json,prisma,public,src,tsconfig.json,postcss.config.js,tailwind.config.js,next-env.d.ts"
          target: "/home/ec2-user/tourista"
          rm: true

      - name: Build and restart Docker container
        uses: appleboy/ssh-action@v1.0.3
        timeout-minutes: 60
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 60m
          script_stop: true
          envs: DATABASE_URL
          script: |
            cd /home/ec2-user/tourista

            if [ -z "$DATABASE_URL" ]; then
              echo "DATABASE_URL is missing. Add it as a GitHub Actions repository secret before deploying."
              exit 1
            fi

            # Stop and remove old container
            docker ps -q --filter publish=80 | xargs -r docker rm -f
            docker rm -f tourista-app || true

            # Build with cache for faster deploys.
            docker build --progress=plain -t ec2-next:latest -f Dockerfile .

            # Run new container
            docker run -d \
              --name tourista-app \
              --restart unless-stopped \
              -p 80:3000 \
              -e DATABASE_URL="$DATABASE_URL" \
              ec2-next:latest

            # Clean up old images
            docker image prune -f
