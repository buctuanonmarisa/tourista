name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy project to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ".dockerignore,Dockerfile,entrypoint.sh,next.config.js,package.json,package-lock.json,prisma,public,src,tsconfig.json,postcss.config.js,tailwind.config.js,next-env.d.ts"
          target: "/home/ec2-user/tourista"
          rm: true

      - name: Build and restart app
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 60m
          script_stop: true
          envs: DATABASE_URL
          script: |
            set -eu

            cd /home/ec2-user/tourista

            if [ -z "${DATABASE_URL:-}" ]; then
              echo "DATABASE_URL GitHub secret is missing."
              exit 1
            fi

            printf 'DATABASE_URL=%s\n' "$DATABASE_URL" > .env.production
            chmod 600 .env.production

            docker build -t tourista:latest .

            docker rm -f tourista-app || true
            docker run -d \
              --name tourista-app \
              --restart unless-stopped \
              -p 80:3000 \
              --env-file .env.production \
              tourista:latest

            docker image prune -f
            docker ps --filter name=tourista-app
