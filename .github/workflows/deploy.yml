name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Build and restart app
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 60m
          envs: DATABASE_URL,GH_PAT
          script: |
            set -eu

            APP_DIR="$HOME/tourista"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            GIT_AUTH_HEADER="AUTHORIZATION: bearer ${GH_PAT:-}"

            echo "Preparing EC2 deployment..."

            if ! command -v git >/dev/null 2>&1; then
              sudo dnf install -y git || sudo yum install -y git
            fi
            git --version

            if [ -z "${GH_PAT:-}" ]; then
              echo "GH_PAT GitHub secret is missing. Add a token with read access to this private repository."
              exit 1
            fi

            if [ -d "$APP_DIR/.git" ]; then
              echo "Updating existing repository..."
              cd "$APP_DIR"
              git -c http.extraheader="$GIT_AUTH_HEADER" fetch --depth 1 origin main
              git reset --hard origin/main
            else
              echo "Cloning repository..."
              sudo rm -rf "$APP_DIR"
              git -c http.extraheader="$GIT_AUTH_HEADER" clone --depth 1 --branch main "$REPO_URL" "$APP_DIR"
              cd "$APP_DIR"
            fi
            pwd
            ls -la

            if [ -z "${DATABASE_URL:-}" ]; then
              echo "DATABASE_URL GitHub secret is missing."
              exit 1
            fi

            printf 'DATABASE_URL=%s\n' "$DATABASE_URL" > .env.production
            chmod 600 .env.production

            docker build -t tourista:latest .

            docker rm -f tourista-app || true
            docker run -d \
              --name tourista-app \
              --restart unless-stopped \
              -p 80:3000 \
              --env-file .env.production \
              tourista:latest

            docker image prune -f
            docker ps --filter name=tourista-app
