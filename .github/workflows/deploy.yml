name: Deploy to EC2

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/tourista

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull and restart app on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GHCR_USER: ${{ github.repository_owner }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          envs: DATABASE_URL,GH_PAT,GHCR_USER,IMAGE_NAME,IMAGE_TAG
          script: |
            set -eu

            if [ -z "${DATABASE_URL:-}" ]; then
              echo "DATABASE_URL GitHub secret is missing."
              exit 1
            fi

            if [ -z "${GH_PAT:-}" ]; then
              echo "GH_PAT GitHub secret is missing. It needs read:packages access for GHCR."
              exit 1
            fi

            if ! command -v docker >/dev/null 2>&1; then
              sudo dnf install -y docker || sudo yum install -y docker
              sudo systemctl enable --now docker
            fi

            if ! docker ps >/dev/null 2>&1; then
              sudo usermod -aG docker "$USER" || true
              DOCKER="sudo docker"
            else
              DOCKER="docker"
            fi

            printf '%s' "$GH_PAT" | $DOCKER login ghcr.io -u "$GHCR_USER" --password-stdin

            printf 'DATABASE_URL=%s\n' "$DATABASE_URL" > "$HOME/tourista.env"
            chmod 600 "$HOME/tourista.env"

            $DOCKER system df || true
            $DOCKER builder prune -af || true
            $DOCKER image prune -af || true

            if ! $DOCKER pull "$IMAGE_NAME:$IMAGE_TAG"; then
              echo "Initial image pull failed. Freeing space used by the current app image and retrying."
              $DOCKER rm -f tourista-app || true
              $DOCKER container prune -f || true
              $DOCKER image prune -af || true
              $DOCKER builder prune -af || true
              $DOCKER pull "$IMAGE_NAME:$IMAGE_TAG"
            else
              $DOCKER rm -f tourista-app || true
            fi

            $DOCKER volume create tourista_uploads >/dev/null
            $DOCKER run -d \
              --name tourista-app \
              --restart unless-stopped \
              -p 80:3000 \
              --env-file "$HOME/tourista.env" \
              -v tourista_uploads:/app/public/uploads \
              "$IMAGE_NAME:$IMAGE_TAG"

            $DOCKER image prune -f
            $DOCKER ps --filter name=tourista-app
