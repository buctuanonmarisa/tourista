name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy project to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/ec2-user/tourista"

      - name: Build and restart Docker container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /home/ec2-user/tourista

            # Stop and remove old container
            docker ps -q --filter publish=80 | xargs -r docker rm -f
            docker rm -f tourista-app || true

            # Build with cache for faster builds (remove --no-cache)
            docker build -t ec2-next:latest -f Dockerfile .

            # Run new container
            docker run -d \
              --name tourista-app \
              --restart unless-stopped \
              -p 80:3000 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              ec2-next:latest

            # Clean up old images
            docker image prune -f