version: '3.8'

services:
  tourista:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tourista-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
    volumes:
      # Persist uploads across container restarts
      - tourista-uploads:/tmp/uploads

volumes:
  tourista-uploads:
    driver: local
